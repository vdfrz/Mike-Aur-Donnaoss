<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 510"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
     font-size="13" role="img"
     aria-label="Local MCP gatekeeper architecture: MikeRust talks to local MCP servers, which in turn front the underlying resources. A separate dashed arrow shows the explicit, opt-in connection to a remote LLM via BYOK.">
  <title>Local MCP gatekeeper</title>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f3f46"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- ─── Subtle band behind the gatekeeper row ─────────────────── -->
  <rect x="20" y="195" width="880" height="100" rx="6"
        fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ─── Tier labels in the left margin ────────────────────────── -->
  <g font-size="10" fill="#9ca3af" text-anchor="start">
    <text x="20" y="20" font-weight="600" letter-spacing="1">HOST</text>
    <text x="20" y="187" font-weight="600" letter-spacing="1">GATEKEEPERS</text>
    <text x="20" y="357" font-weight="600" letter-spacing="1">PROTECTED RESOURCES</text>
  </g>

  <!-- ─── Top row: MikeRust (host) ──────────────────────────────── -->
  <g transform="translate(340, 35)">
    <rect width="240" height="70" rx="6"
          fill="#eef2f7" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="120" y="32" text-anchor="middle"
          font-weight="600" fill="#1e3a5f" font-size="17">MikeRust</text>
    <text x="120" y="52" text-anchor="middle"
          fill="#3c5a87" font-size="12">MCP host</text>
  </g>

  <!-- ─── Remote LLM (BYOK), top-right, dashed/de-emphasised ────── -->
  <g transform="translate(720, 38)">
    <rect width="180" height="60" rx="6"
          fill="#ffffff" stroke="#9ca3af" stroke-width="1"
          stroke-dasharray="4 3"/>
    <text x="90" y="26" text-anchor="middle"
          font-weight="500" fill="#374151" font-size="13">Remote LLM</text>
    <text x="90" y="44" text-anchor="middle"
          fill="#6b7280" font-size="11">(BYOK)</text>
  </g>

  <!-- Dashed arrow MikeRust → Remote LLM, with caption -->
  <path d="M 580 65 Q 650 50, 720 65"
        fill="none" stroke="#9ca3af" stroke-width="1.2"
        stroke-dasharray="5 3" marker-end="url(#arrow-dashed)"/>
  <text x="650" y="42" text-anchor="middle"
        font-style="italic" font-size="11" fill="#6b7280">
    explicit, separate
  </text>

  <!-- ─── Middle row: 4 MCP gatekeepers ─────────────────────────── -->
  <g transform="translate(40, 215)">
    <rect width="180" height="60" rx="5"
          fill="#f4f4f5" stroke="#52525b" stroke-width="1.2"/>
    <text x="90" y="28" text-anchor="middle"
          font-weight="600" fill="#18181b" font-size="13">DMS gateway</text>
    <text x="90" y="46" text-anchor="middle"
          fill="#52525b" font-size="11">MCP server</text>
  </g>

  <g transform="translate(245, 215)">
    <rect width="180" height="60" rx="5"
          fill="#f4f4f5" stroke="#52525b" stroke-width="1.2"/>
    <text x="90" y="28" text-anchor="middle"
          font-weight="600" fill="#18181b" font-size="13">Pseudonymisation</text>
    <text x="90" y="46" text-anchor="middle"
          fill="#52525b" font-size="11">(Edito)</text>
  </g>

  <g transform="translate(450, 215)">
    <rect width="200" height="60" rx="5"
          fill="#f4f4f5" stroke="#52525b" stroke-width="1.2"/>
    <text x="100" y="28" text-anchor="middle"
          font-weight="600" fill="#18181b" font-size="13">Engagement-letter</text>
    <text x="100" y="46" text-anchor="middle"
          fill="#52525b" font-size="11">filter</text>
  </g>

  <g transform="translate(675, 215)">
    <rect width="200" height="60" rx="5"
          fill="#f4f4f5" stroke="#52525b" stroke-width="1.2"/>
    <text x="100" y="28" text-anchor="middle"
          font-weight="600" fill="#18181b" font-size="13">Authoritative corpus</text>
    <text x="100" y="46" text-anchor="middle"
          fill="#52525b" font-size="11">MCP server</text>
  </g>

  <!-- ─── Arrows: MikeRust → each gatekeeper ────────────────────── -->
  <!-- All start from the bottom of the host box (y=105), spread along its
       240-px width, and land at the top centre of each gatekeeper (y=215). -->
  <path d="M 380 105 L 130 215" fill="none"
        stroke="#3f3f46" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 430 105 L 335 215" fill="none"
        stroke="#3f3f46" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 490 105 L 550 215" fill="none"
        stroke="#3f3f46" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 540 105 L 775 215" fill="none"
        stroke="#3f3f46" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ─── Bottom row: protected resources ───────────────────────── -->
  <g transform="translate(40, 370)">
    <rect width="180" height="60" rx="5"
          fill="#ffffff" stroke="#a1a1aa" stroke-width="1"/>
    <text x="90" y="28" text-anchor="middle"
          font-weight="500" fill="#3f3f46" font-size="13">DMS database</text>
    <text x="90" y="46" text-anchor="middle"
          fill="#71717a" font-size="11">vendor backend</text>
  </g>

  <g transform="translate(245, 370)">
    <rect width="180" height="60" rx="5"
          fill="#ffffff" stroke="#a1a1aa" stroke-width="1"/>
    <text x="90" y="28" text-anchor="middle"
          font-weight="500" fill="#3f3f46" font-size="13">Local file system</text>
    <text x="90" y="46" text-anchor="middle"
          fill="#71717a" font-size="11">user documents</text>
  </g>

  <g transform="translate(450, 370)">
    <rect width="200" height="60" rx="5"
          fill="#ffffff" stroke="#a1a1aa" stroke-width="1"/>
    <text x="100" y="28" text-anchor="middle"
          font-weight="500" fill="#3f3f46" font-size="13">Client matter store</text>
    <text x="100" y="46" text-anchor="middle"
          fill="#71717a" font-size="11">files in scope of the engagement</text>
  </g>

  <g transform="translate(675, 370)">
    <rect width="200" height="60" rx="5"
          fill="#ffffff" stroke="#a1a1aa" stroke-width="1"/>
    <text x="100" y="28" text-anchor="middle"
          font-weight="500" fill="#3f3f46" font-size="13">EUR-Lex / Italia legale</text>
    <text x="100" y="46" text-anchor="middle"
          fill="#71717a" font-size="11">authoritative corpora</text>
  </g>

  <!-- ─── Arrows: each gatekeeper → its protected resource ──────── -->
  <path d="M 130 275 L 130 370" fill="none"
        stroke="#3f3f46" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 335 275 L 335 370" fill="none"
        stroke="#3f3f46" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 550 275 L 550 370" fill="none"
        stroke="#3f3f46" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 775 275 L 775 370" fill="none"
        stroke="#3f3f46" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ─── Caption ───────────────────────────────────────────────── -->
  <text x="460" y="475" text-anchor="middle"
        font-style="italic" font-size="15" fill="#52525b">
    The AI sees what the gatekeeper allows, nothing more.
  </text>
</svg>
