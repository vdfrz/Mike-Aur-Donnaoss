<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Mike aur Donna app icon: 12-blade aperture mark (flattened from MikeIcon) on a near-white rounded square. -->
  <defs>
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#151515" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#080808" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#666666" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>
    <path id="blade" d="M 40,0 A 4,4 0 0 1 43,-3 Q 95,-22 147,-3 A 4,4 0 0 1 150,0 A 4,4 0 0 1 147,3 Q 95,22 43,3 A 4,4 0 0 1 40,0 Z"/>
    <g id="aperture">
      <g transform="rotate(0)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(30)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(60)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(90)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(120)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(150)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(180)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(210)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(240)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(270)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(300)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
      <g transform="rotate(330)"><use href="#blade" fill="url(#glassFill)"/><use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="0.8"/></g>
    </g>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="#f5f6f8"/>
  <use href="#aperture" transform="translate(512,512) scale(2.0)"/>
</svg>
