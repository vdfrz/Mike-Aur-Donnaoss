      <use href="#blade" fill="url(#prism)" opacity="0.3" />
      <use href="#blade" fill="url(#specular)" clip-path="url(#topClip)" />
      <use href="#blade" fill="none" stroke="url(#glassBorder)" stroke-width="1" />
